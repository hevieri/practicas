<!DOCTYPE html>
<html>
<head>
    <title>Contacto Express</title>
</head>
<body>

<h2>Contacto</h2>

<form id="formContacto">
    <input type="text" name="nombre" id="nombre" placeholder="Tu nombre"><br><br>
    <textarea name="mensaje" id="mensaje" placeholder="Tu mensaje"></textarea><br><br>
    <button type="submit">Enviar</button>
</form>

<p id="respuesta"></p>

<script>
document.getElementById('formContacto').addEventListener('submit', function(e) {
    e.preventDefault(); // No recargar página

    const nombre = document.getElementById('nombre').value.trim();
    const mensaje = document.getElementById('mensaje').value.trim();
    const respuesta = document.getElementById('respuesta');

    // Validación simple
    if (!nombre || !mensaje) {
        respuesta.textContent = 'Por favor completá todos los campos.';
        respuesta.style.color = 'red';
        return;
    }

    // Enviar datos al PHP con fetch
    fetch('contacto.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: `nombre=${encodeURIComponent(nombre)}&mensaje=${encodeURIComponent(mensaje)}`
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            respuesta.textContent = data.success;
            respuesta.style.color = 'green';
            this.reset();
        } else {
            respuesta.textContent = data.error;
            respuesta.style.color = 'red';
        }
    })
    .catch(() => {
        respuesta.textContent = 'Error en la conexión.';
        respuesta.style.color = 'red';
    });
});
</script>

</body>
</html>

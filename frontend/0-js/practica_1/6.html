<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Ejercicio 6</h1>

    <script>
        document.write('<p>Multiplo de 2: </p>');

        for(var i = 1; i <49; i++){
            if (i % 2 == 0){
                document.write(i + ',');
            }
        }

        for(i = 49; i < 51; i++){
            if (i % 2 == 0){
                document.write(i);
            }
        }

        document.write('<p>Multiplos de 3: </p>');

        for(var i = 1; i < 47; i++){
            if (i % 3 == 0){
                document.write(i + ',');
            }
        }

        for(i = 47; i < 51; i++){
            if (i % 3 == 0){
                document.write(i);
            }
        }


    </script>
</body>
</html>

<!DOCTYPE html>
<html>
  <head>
    <title>Días del Mes</title>
  </head>
  <body>
    <h1>Ingresa un Mes:</h1>
    <input type="text" id="mes" placeholder="Ej: 1">
    <button onclick="diasDelMes()">Obtener Días</button>
    <div id="resultado"></div>
    <script>
      function diasDelMes() {
        const mes = document.getElementById("mes").value;
        let dias;

        switch (mes) {
          case "1":
          case "3":
          case "5":
          case "7":
          case "8":
          case "10":
          case "12":
            dias = "31 días";
            break;
          case "4":
          case "6":
          case "9":
          case "11":
            dias = "30 días";
            break;
          case "2":
            dias = "28 o 29 días";
            break;
          default:
            dias = "Ingresa un mes válido (1-12)";
        }

        document.getElementById("resultado").innerHTML = `El mes ${mes} tiene ${dias}.`;
      }
    </script>
  </body>
</html>

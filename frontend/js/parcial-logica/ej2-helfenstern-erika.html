<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 2</title>
</head>
<body>
    <script>

        var lado1 = +prompt('Ingrese un lado de un triángulo');
        var lado2 = +prompt('Ingrese otro lado de un triángulo');
        var lado3 = +prompt('Ingrese un lado más de un triángulo');

        if( lado1 == lado2){
            if(lado2 == lado3){
                // Los tres lados son iguales
                document.write('Tu triángulo es Equilátero');
            }else{
                // Solo lado 1 y 2 son iguales
                document.write('Tu triangulo es Isóceles');
            }
        }else if(lado1 == lado3){
            // Lado 1 y 2 son diferentes pero 1 y 3 son iguales
            document.write('Tu triángulo es Isóceles');
        }else if(lado2 == lado3){
            // Lado 1 y 2 son diferntes pero 2 y 3 son iguales
            document.write('Tu triángulo es Isóceles');
        }else{
            // Ningún lado es igual a otro
            document.write('Tu triángulo es Escaleno');
        }

    </script>
</body>
</html>

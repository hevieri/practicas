<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <title>Document</title>
</head>
<body>
    <h1>Ejercicio 5</h1>
    <script>
        for(var i = 1; i < 29; i++){
            if (i % 3 == 0){
                document.write(i + ',');
            }
        }

        for(i = 29; i < 31; i++){
            if(i % 3 == 0){
                document.write(i);

            }
        }
    </script>
</body>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var mes;
        mes = prompt('Ingrese un numero del 1 al 12 inclusive');
        switch (mes){
            case '1' :
            case '2' :
            case '12' :
            switch(mes){
            case '1' :
                var posicion = 'enero';
                break;
            case '2' :
                var posicion = 'febrero';
            case '12' :
                var posicion = 'diciembre';
            }

            document.write('Al finalizar el mes ' + posicion + ' estaremos en verano');
            break;
            document.write('<p>Usted ha ingresado el mes de febrero</p>');
            break;

            case '3':
            document.write('<p>Usted ha ingresado el mes de marzo</p>');
            break;

            case '4':
            document.write('<p>Usted ha ingresado el mes de abril</p>');
            break;

            case '5':
            document.write('<p>Usted ha ingresado el mes de mayo</p>');
            break;

            case '6':
            document.write('<p>Usted ha ingresado el mes de junio</p>');
            break;

            case '8':
            document.write('<p>Usted ha ingresado el mes de agosto</p>');
            break;

            case '9':
            document.write('<p>Usted ha ingresado el mes de septiembre</p>');
            break;

            case '10':
            document.write('<p>Usted ha ingresado el mes de octubre</p>');
            break;

            case '11':
            document.write('<p>Usted ha ingresado el mes de noviembre</p>');
            break;

            case '12':
            document.write('<p>Usted ha ingresado el mes de diciembre</p>');
            break;

        }
    </script>
</body>
</html>

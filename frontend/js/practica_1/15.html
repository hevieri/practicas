<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <body>
        <h1>Ejercicio 4</h1>
    
        <script>
            var dia;
            dia= prompt('Ingrese un numero del 1 al 12 inclusive');
    
            switch (dia) {
                case'1' :
                document.write('<p>Enero</p>');
                break;
    
                case'2' :
                document.write('<p>Febrero</p>');
                break;
    
                case'3' :
                document.write('<p>Marzo</p>');
                break;
    
                case'4' :
                document.write('<p>Abril</p>');
                break;
    
                case'5' :
                document.write('<p>Mayo</p>');
                break;
    
                case'6' :
                document.write('<p>Junio</p>');
                break;
    
                case'7' :
                document.write('<p>Julio</p>');
                break;

                case'8' :
                document.write('<p>Agosto</p>');
                break;

                case'9' :
                document.write('<p>Septiembre</p>');
                break;

                case'10' :
                document.write('<p>Octubre</p>');
                break;

                case'11' :
                document.write('<p>Noviembre</p>');
                break;

                case'12' :
                document.write('<p>Diciembre</p>');
                break;
            }
        </script>
</body>
</html>

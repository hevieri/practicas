<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Ejercicio 9</h1>

    <script>
        var numeroMayor = null;
        var numeroMenor = null;
        var sumaTotal = 0;

        for (var i=1; i<= 5; i++){
            var numero = parseFloat(prompt("Ingrese el numero #" + i + ":"));

        

        if (numeroMayor === null || numero > numeroMayor){
            numeroMayor = numero;
        }

        if(numeroMenor ===null || numero < numeroMenor){
            numeroMenor = numero;
        }

        sumaTotal += numero;
    }


    var promedio = sumaTotal / 5;

    document.write("<p>El numero mayor ingresado es: "+ numeroMayor + "</p");
    document.write("<p>El numero mayor ingresado es: "+ numeroMenor + "</p");
    document.write("<p>El promedio de los numeros ingresados es: "+ promedio + "</p");
    </script>
</body>
</html>

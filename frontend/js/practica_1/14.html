<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 3</title>
</head>
<body>
    <h1>Ejercicio 3</h1>

    <script>
        var dia;
        dia= prompt('Ingrese un numero del 1 al 7 inclusive');

        switch (dia) {
            case'1' :
            document.write('<p>Lunes</p>');
            break;

            case'2' :
            document.write('<p>Martes</p>');
            break;

            case'3' :
            document.write('<p>Miercoles</p>');
            break;

            case'4' :
            document.write('<p>Jueves</p>');
            break;

            case'5' :
            document.write('<p>Viernes</p>');
            break;

            case'6' :
            
            case'7' :
            document.write('<p>Fin de semana</p>');
            break;
            default :
            document.write('Dato no valido');
            break;
           
        }
    </script>
</body>
</html>

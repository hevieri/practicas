<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Ejercicio 8</h1>
    <script>
        let numeroMenor = null;

        for (var i =1; i <=5; i++){
            var numero = parseFloat(prompt("Ingrese el numero"));

            if (numeroMenor === null || numero < numeroMenor){
                numeroMenor = numero;
            }
        }

        document.write("<p>El numero menor ingresado es: " + numeroMenor + "</p>");


    </script>
</body>
</html>

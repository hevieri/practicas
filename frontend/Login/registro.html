<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
  <form action="/register" method="post">
    <h1>Registro</h1>
    <div class="input-group">
      <input type="text" id="fullname" name="fullname" placeholder="Nombre completo" required>
    </div>
    <div class="input-group">
      <input type="email" id="email" name="email" placeholder="Correo electrónico" required>
    </div>
    <div class="input-group">
      <input type="text" id="username" name="username" placeholder="Usuario" required>
    </div>
    <div class="input-group">
      <input type="password" id="password" name="password" placeholder="Contraseña" required>
    </div>
    <div class="input-group">
      <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirmar contraseña" required>
    </div>
    <div class="buttons">
      <input type="submit" value="Registrar" class="register-btn">
      <input type="button" value="Cancelar" class="cancel-btn">
    </div>
  </form>
</body>
</html>
